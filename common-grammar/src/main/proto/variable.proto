syntax = "proto3";

package orka.api;

import "google/protobuf/struct.proto";
import "common.proto";
option java_package = "com.Orka.apiContract.generated";
option java_multiple_files = true;
message VariableDefinition {
  string name = 1;
  VariableType variable_type = 2;
  google.protobuf.Value default_value = 3;
}