syntax = "proto3";

package orka.api;

import "variable.proto";
option java_package = "com.Orka.apiContract.generated";
option java_multiple_files = true;
message ScriptDefinition {

  string script_name = 1;

  string docker_image = 2;

  int32 version = 3;

  string entry_command = 4;

  int32 timeout = 5;

  repeated VariableDefinition environment_variables = 6;
}
