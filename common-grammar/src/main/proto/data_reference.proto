syntax = "proto3";

package orka.api;

import "google/protobuf/struct.proto";
option java_package = "com.Orka.apiContract.generated";
option java_multiple_files = true;
message ConstantReference {
  google.protobuf.Value value = 1;
}

message StateInputReference {
  string task_definition_name = 1;
  string state_definition_name = 2;
  string json_path = 3;
}

message StateOutputReference {
  string task_definition_name = 1;
  string state_definition_name = 2;
  string json_path = 3;
}

message WorkflowVariableReference {
  string variable_name = 1;
}

message DataReference {

  int32 id = 1;

  oneof reference {

    ConstantReference constant = 2;

    StateInputReference state_input = 3;

    StateOutputReference state_output = 4;

    WorkflowVariableReference workflow_variable = 5;
  }
}