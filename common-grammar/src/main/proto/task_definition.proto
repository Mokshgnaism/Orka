syntax = "proto3";

package orka.api;

import "state_definition.proto";
import "common.proto";
option java_package = "com.Orka.apiContract.generated";
option java_multiple_files = true;
message TaskDefinition {

  string name = 1;

  string description = 2;

  repeated StateDefinition states = 3;
  repeated TaskDefinitionAuthorization authorizations = 4;
}

message TaskDefinitionAuthorization{
  string username = 1;
  TaskDefinitionAuthRole authorization = 2;
}